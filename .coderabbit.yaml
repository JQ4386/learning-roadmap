# CodeRabbit configuration — https://docs.coderabbit.ai/getting-started/configure-coderabbit
# Active once the CodeRabbit GitHub App is installed on this repo.
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false # don't review draft PRs; mark "Ready for review" to trigger
  tools:
    github-checks:
      enabled: true
chat:
  auto_reply: true
